<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .welcome-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 35px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            text-decoration: none;
            background-color: #0ea5e9;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        .cta-button:hover {
            background-color: #0284c7;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
            .welcome-container { margin: 20px; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Welcome!</h1>
        <p>You are looking at a modern, lightweight welcome page built using pure HTML and CSS.</p>
        <a href="#" class="cta-button" onclick="location.href='/home'">Get Started!</a>
    </div>

</body>
</html>
